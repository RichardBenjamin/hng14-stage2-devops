name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # ── Stage 1: Lint ────────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install flake8
        run: pip install flake8

      - name: Lint Python - api
        run: flake8 api/main.py --max-line-length=100

      - name: Lint Python - worker
        run: flake8 worker/worker.py --max-line-length=100

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend deps
        run: cd frontend && npm install

      - name: Lint JavaScript
        run: cd frontend && npm run lint

      - name: Lint Dockerfiles
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile
          ignore: DL3008,DL3013,DL3042,DL3018

      - name: Lint worker Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: worker/Dockerfile
          ignore: DL3008,DL3013,DL3042,DL3018

      - name: Lint frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile
          ignore: DL3008,DL3013,DL3042,DL3018

  # ── Stage 2: Test ────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          cd api
          pip install -r requirements.txt

      - name: Run pytest with coverage
        run: |
          cd api
          pytest tests/ --cov=. --cov-report=xml --cov-report=term

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml

  # ── Stage 3: Build ───────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: test
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            localhost:5000/api:${{ github.sha }}
            localhost:5000/api:latest

      - name: Build and push worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            localhost:5000/worker:${{ github.sha }}
            localhost:5000/worker:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            localhost:5000/frontend:${{ github.sha }}
            localhost:5000/frontend:latest

  # ── Stage 4: Security Scan ───────────────────────────────────────────────────
  security:
    runs-on: ubuntu-latest
    needs: build
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Rebuild images into local registry
        run: |
          docker buildx build --push -t localhost:5000/api:latest ./api
          docker buildx build --push -t localhost:5000/worker:latest ./worker
          docker buildx build --push -t localhost:5000/frontend:latest ./frontend

      - name: Pull images for scanning
        run: |
          docker pull localhost:5000/api:latest
          docker pull localhost:5000/worker:latest
          docker pull localhost:5000/frontend:latest

      - name: Scan API image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: localhost:5000/api:latest
          format: sarif
          output: trivy-api.sarif
          severity: CRITICAL
          exit-code: "1"

      - name: Scan worker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: localhost:5000/worker:latest
          format: sarif
          output: trivy-worker.sarif
          severity: CRITICAL
          exit-code: "1"

      - name: Scan frontend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: localhost:5000/frontend:latest
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL
          exit-code: "1"

      - name: Upload Trivy results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-results
          path: "*.sarif"

  # ── Stage 5: Integration Test ────────────────────────────────────────────────
  integration:
    runs-on: ubuntu-latest
    needs: security
    steps:
      - uses: actions/checkout@v4

      - name: Create .env file
        run: |
          echo "REDIS_PASSWORD=testpassword" >> .env
          echo "QUEUE_KEY=jobs" >> .env

      - name: Start full stack
        run: docker compose up --build -d

      - name: Wait for stack to be ready
        run: |
          echo "Waiting for frontend..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/health; then
              echo "Stack is ready"
              break
            fi
            echo "Attempt $i/30..."
            sleep 3
          done

      - name: Submit a job and poll for completion
        run: |
          JOB_ID=$(curl -sf -X POST http://localhost:3000/submit | jq -r '.job_id')
          echo "Submitted job: $JOB_ID"

          for i in $(seq 1 20); do
            STATUS=$(curl -sf http://localhost:3000/status/$JOB_ID | jq -r '.status')
            echo "Status: $STATUS"
            if [ "$STATUS" = "completed" ]; then
              echo "Job completed successfully"
              exit 0
            fi
            sleep 2
          done

          echo "Job did not complete in time"
          exit 1

      - name: Tear down stack
        if: always()
        run: docker compose down -v

  # ── Stage 6: Deploy ──────────────────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Create .env file
        run: |
          echo "REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}" >> .env
          echo "QUEUE_KEY=jobs" >> .env

      - name: Rolling update
        run: |
          docker compose pull || true
          docker compose up --build -d --no-deps --scale api=2 api
          
          echo "Waiting for new api container to be healthy..."
          for i in $(seq 1 12); do
            if curl -sf http://localhost:8000/health; then
              echo "New container is healthy"
              docker compose up -d --no-deps --scale api=1 api
              exit 0
            fi
            echo "Attempt $i/12..."
            sleep 5
          done

          echo "Health check failed — aborting deploy, old container left running"
          docker compose up -d --no-deps --scale api=1 api
          exit 1
